name: Markd
options:
  bundleIdPrefix: com.chathura
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Markd:
    type: application
    platform: macOS
    sources:
      - path: Markd
        excludes:
          - "Resources/Web/**"
      - path: Markd/Resources/Web
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chathura.Markd
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        PRODUCT_NAME: Markd
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - target: MarkdQuickLook
        embed: true
        codeSign: true
    entitlements:
      path: Markd/Markd.entitlements
      properties:
        com.apple.security.app-sandbox: false
    info:
      path: Markd/Info.plist
      properties:
        CFBundleDocumentTypes:
          - CFBundleTypeName: "Markdown Document"
            CFBundleTypeRole: "Editor"
            LSHandlerRank: "Default"
            LSItemContentTypes:
              - "net.daringfireball.markdown"
        CFBundleURLTypes:
          - CFBundleURLName: "com.chathura.Markd"
            CFBundleURLSchemes:
              - "markd"
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: "net.daringfireball.markdown"
            UTTypeDescription: "Markdown Document"
            UTTypeConformsTo:
              - "public.plain-text"
            UTTypeTagSpecification:
              public.filename-extension:
                - "md"
                - "markdown"
                - "mdown"
                - "mkd"
                - "mdx"
              public.mime-type:
                - "text/markdown"

  MarkdQuickLook:
    type: app-extension
    platform: macOS
    sources:
      - path: MarkdQuickLook
      - path: Markd/Utilities/ImageResolver.swift
      - path: Markd/Resources/Web
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chathura.Markd.QuickLookExtension
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: false
    info:
      path: MarkdQuickLook/Info.plist
      properties:
        CFBundleDisplayName: "Markd Quick Look"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.quicklook.preview
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).PreviewViewController"
        QLSupportedContentTypes:
          - "net.daringfireball.markdown"
          - "public.plain-text"
